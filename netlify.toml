[build]
  command = "printf 'window.UAT_SUPABASE_CONFIG = {\\n  url: \"%s\",\\n  key: \"%s\",\\n  scope: \"%s\",\\n  bucket: \"%s\"\\n};\\n' \"${VITE_SUPABASE_URL:-$SUPABASE_URL}\" \"${SUPABASE_KEY:-${VITE_SUPABASE_KEY:-${VITE_SUPABASE_PUBLISHABLE_KEY:-$SUPABASE_PUBLISHABLE_KEY}}}\" \"${UAT_SCOPE:-uat}\" \"${UAT_BUCKET:-uat-templates}\" > js/config.js"
  publish = "."

[[headers]]
  for = "/*.js"
  [headers.values]
    Content-Type = "application/javascript; charset=utf-8"
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/*.html"
  [headers.values]
    Content-Type = "text/html; charset=utf-8"
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
